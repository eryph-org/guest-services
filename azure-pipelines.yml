trigger:
- main
- refs/tags/v*

variables:
  - name: buildConfiguration
    value: 'Release'

jobs:
- job: windows
  pool:
    vmImage: windows-2022
  
  variables:
  - name: serviceArtifactName
    value: egs_$(Build.BuildNumber)_windows_amd64.zip
  - name: toolArtifactName
    value: egs-tool_$(Build.BuildNumber)_windows_amd64.zip
  
  steps:
  - checkout: self
    fetchDepth: 0

  - task: gitversion/setup@3.1.11
    displayName: Install GitVersion
    inputs:
      versionSpec: '5.11.x'

  - task: gitversion/execute@3.1.11
    displayName: Execute GitVersion
  
  - task: DotNetCoreCLI@2
    displayName: dotnet build
    inputs:
      command: build
      projects: '**/*.csproj'
      arguments: '--configuration $(buildConfiguration) --runtime win-x64'
  
  - task: DotNetCoreCLI@2
    displayName: dotnet test
    inputs:
      command: test
      # The test/e2e/ tree is for the Pester-driven flow that needs an eryph
      # host. CI doesn't have one, so skip it.
      projects: |
        **/test/**/*.csproj
        !**/test/e2e/**/*.csproj
      arguments: '--configuration $(buildConfiguration) --runtime win-x64 --collect "Code coverage" --no-build'

  - task: DotNetCoreCLI@2
    displayName: dotnet publish (service)
    inputs:
      command: 'publish'
      publishWebProjects: false
      projects: 'src/Eryph.GuestServices.Service/*.csproj'
      arguments: '--configuration $(buildConfiguration) --runtime win-x64 --no-build --output $(Build.ArtifactStagingDirectory)/egs/bin'
      zipAfterPublish: false
      modifyOutputPath: false

  - task: ArchiveFiles@2
    displayName: pack (service)
    inputs:
      rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/egs'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/$(serviceArtifactName)'

  - task: PublishPipelineArtifact@1
    displayName: upload (service)
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)/$(serviceArtifactName)'
      artifactName: guest-windows

  - task: DotNetCoreCLI@2
    displayName: dotnet publish (tool)
    inputs:
      command: 'publish'
      publishWebProjects: false
      projects: 'src/Eryph.GuestServices.Tool/*.csproj'
      arguments: '--configuration $(buildConfiguration) --runtime win-x64 --no-build --output $(Build.ArtifactStagingDirectory)/egs-tool/bin'
      zipAfterPublish: false
      modifyOutputPath: false

  - task: ArchiveFiles@2
    displayName: pack (tool)
    inputs:
      rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/egs-tool'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/$(toolArtifactName)'

  - task: PublishPipelineArtifact@1
    displayName: upload (tool)
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)/$(toolArtifactName)'
      artifactName: tool

  # Library packages consumed by eryph. Only the IsPackable=true libraries
  # emit a .nupkg; everything else in src/ is IsPackable=false (set in
  # src/Directory.Build.props), so the glob is safe. Version comes from
  # GitVersion.MsBuild in the projects.
  - task: DotNetCoreCLI@2
    displayName: dotnet pack (libraries)
    inputs:
      command: pack
      packagesToPack: 'src/**/*.csproj'
      configuration: $(buildConfiguration)
      packDirectory: '$(Build.ArtifactStagingDirectory)/packages'

  - task: NuGetAuthenticate@1
    displayName: NuGet authenticate

  - task: NuGetCommand@2
    displayName: nuget push (libraries)
    inputs:
      command: push
      packagesToPush: '$(Build.ArtifactStagingDirectory)/packages/*.nupkg'
      nuGetFeedType: internal
      publishVstsFeed: 'public/Public'
      # CI publishes prerelease packages on every build; tolerate a
      # re-pushed version on build re-runs instead of failing.
      allowPackageConflicts: true

- job: linux
  pool:
    vmImage: ubuntu-22.04

  variables:
  - name: serviceArtifactName
    value: egs_$(Build.BuildNumber)_linux_amd64.tar.gz
  
  steps:
  - checkout: self
    fetchDepth: 0

  - task: gitversion/setup@3.1.11
    displayName: Install GitVersion
    inputs:
      versionSpec: '5.11.x'

  - task: gitversion/execute@3.1.11
    displayName: Execute GitVersion
  
  - task: DotNetCoreCLI@2
    displayName: dotnet build
    inputs:
      command: build
      projects: '**/*.csproj'
      arguments: '--configuration $(buildConfiguration) --runtime linux-x64'
  
  - task: DotNetCoreCLI@2
    displayName: dotnet test
    inputs:
      command: test
      # Tool.Tests targets net10.0-windows because the Tool depends on
      # HvDataExchange.Host (WMI). It cannot run on Linux; the Windows job
      # exercises it. The test/e2e/ tree is the Pester-driven flow that
      # needs an eryph host — not a CI fit.
      projects: |
        **/test/**/*.csproj
        !**/Eryph.GuestServices.Tool.Tests.csproj
        !**/test/e2e/**/*.csproj
      arguments: '--configuration $(buildConfiguration) --runtime linux-x64 --collect "Code coverage" --no-build'

  - task: DotNetCoreCLI@2
    displayName: dotnet publish (service)
    inputs:
      command: 'publish'
      publishWebProjects: false
      projects: 'src/Eryph.GuestServices.Service/*.csproj'
      arguments: '--configuration $(buildConfiguration) --runtime linux-x64 --no-build --output $(Build.ArtifactStagingDirectory)/egs/bin'
      zipAfterPublish: false
      modifyOutputPath: false

  - task: ArchiveFiles@2
    displayName: pack (service)
    inputs:
      rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/egs'
      includeRootFolder: false
      archiveType: 'tar'
      tarCompression: 'gz'
      archiveFile: '$(Build.ArtifactStagingDirectory)/$(serviceArtifactName)'

  - task: PublishPipelineArtifact@1
    displayName: upload (service)
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)/$(serviceArtifactName)'
      artifactName: guest-linux

- job: iso
  dependsOn:
    - windows
    - linux

  pool:
    vmImage: ubuntu-22.04

  variables:
  - name: serviceArtifactName
    value: egs_$(Build.BuildNumber).iso

  steps:
  - checkout: self

  - task: DownloadPipelineArtifact@2
    displayName: Download Linux service artifact
    inputs:
      artifactName: guest-linux
      targetPath: 'packaging/iso'

  - task: DownloadPipelineArtifact@2
    displayName: Download Windows service artifact
    inputs:
      artifactName: guest-windows
      targetPath: 'packaging/iso'

  - script: |
      chmod +x packaging/iso/install.sh
      xorriso -as mkisofs -o '$(Build.ArtifactStagingDirectory)/$(serviceArtifactName)' -V EGS -P eryph -R -J -T -v 'packaging/iso'
    displayName: Create ISO

  - task: PublishPipelineArtifact@1
    displayName: Upload ISO
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)/$(serviceArtifactName)'
      artifactName: guest-iso
