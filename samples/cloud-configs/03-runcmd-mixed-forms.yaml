#cloud-config
# Sample 03 — runcmd with both shell-string and argv-list forms.
#
# Exercises:
#   - RuncmdModule, IsShellCommand branching.
#   - YAML scalar-vs-sequence converter for runcmd entries.
#
# Note on quoting: YAML treats "<text>: <text>" inside an UNQUOTED plain scalar
# as a mapping indicator, so list items that contain a colon followed by a space
# must be quoted (single or double). The double-quoted strings INSIDE these
# entries are literal characters, not YAML quoting.
#
# Expected provisioning outcome:
#   - Three runcmd entries are executed in order.
#   - The first two are shell strings; the third is an exec-style argv list.
runcmd:
  - 'echo "first runcmd entry: shell string"'
  - 'powershell.exe -NoProfile -Command "Write-Host ''second entry: shell string invoking pwsh''"'
  - [ powershell.exe, -NoProfile, -Command, "Write-Host 'third entry: argv list'" ]
